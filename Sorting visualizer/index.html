<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sorting Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Sorting Visualizer</h1>

    <div class="controls">
        <button onclick="generateArray()">Generate New Array</button>

        <select id="algorithm">
            <option value="bubble">Bubble Sort</option>
            <option value="selection">Selection Sort</option>
            <option value="insertion">Insertion Sort</option>
            <option value="merge">Merge Sort</option>
            <option value="quick">Quick Sort</option>
        </select>

        <label>Speed:</label>
        <input type="range" id="speedRange" min="1" max="100" value="50">

        <button onclick="startSorting()">Start Sorting</button>
    </div>

    <div id="array-container"></div>
    <div class="info-panel">
    <h3>Algorithm Info</h3>
    <p><strong>Time Complexity:</strong> <span id="timeComplexity">-</span></p>
    <p><strong>Space Complexity:</strong> <span id="spaceComplexity">-</span></p>
    <p><strong>Execution Time:</strong> <span id="executionTime">0 ms</span></p>
</div>

    <script src="script.js"></script>
</body>

</html>
